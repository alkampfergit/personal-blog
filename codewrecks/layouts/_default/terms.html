{{ define "main" }}
<div class="container">
  <h1 style="font-family: 'Montserrat', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--navy); margin-bottom: 1.5rem;">{{ .Title }}</h1>
  <ul class="taxonomy-list">
    {{ range .Pages }}
    <li><a href="{{ .RelPermalink }}">{{ .Title }} ({{ .Pages.Len }})</a></li>
    {{ end }}
  </ul>
</div>
{{ end }}
